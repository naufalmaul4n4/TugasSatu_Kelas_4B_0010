<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document Object Models</title>
</head>
<body>
    
    <div class="card">
            <h1>Todo List</h1>

        <div action="" id="formTodo">
                <input type="text" type="text" id="inpuTask" placeholder="Masukkan tugas">
                <input type="date" id="inputDate">

                <button id="btnTambahTodo">Tambah</button>

        </div>
        <h3>Daftar Tugas</h3>

        <ul id="listTugas"></ul>
    </div>

    <div id="modalEdit" class="modal">
        <div class="modal-content">
            <h3>Edit Tugas</h3>
            <input type="text" id="editValue">
            <input type="date" id="editDate">
            <div class="modal-buttons">
                <button id="btnSimpanEdit">Simpan</button>
                <button id="btnBatalEdit">Batal</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
